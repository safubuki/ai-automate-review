name: AI Docs Review (GitHub Models)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  ai-docs-review:
    runs-on: ubuntu-latest
    # draft PRは対象外（コストコントロール）
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --patch > pr.diff
          # 差分サイズを取得（大規模PR対策の参考用）
          echo "Generated PR diff ($(stat -c%s pr.diff) bytes)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare AI input files
        run: |
          printf '%s' "$PR_TITLE" > /tmp/ai-pr-title.txt
          printf '%s' "$PR_BODY" > /tmp/ai-pr-body.txt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '（本文なし）' }}

      - name: AI Documentation Review
        id: review
        uses: actions/ai-inference@v1
        with:
          prompt-file: .github/prompts/docs-review.prompt.yml
          file_input: |
            pr_title: /tmp/ai-pr-title.txt
            pr_body: /tmp/ai-pr-body.txt
            diff: pr.diff

      - name: Post review summary
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🤖 AIドキュメントレビュー結果（GitHub Models）

            ${{ steps.review.outputs.response }}

            ---
            *使用モデル: openai/gpt-4o / 自動生成レビューです。人間による最終確認を強く推奨します。*

            > **このレビューは [docs/用語集.md](https://github.com/${{ github.repository }}/blob/main/docs/用語集.md) および [.github/copilot-instructions.md](https://github.com/${{ github.repository }}/blob/main/.github/copilot-instructions.md) を基に実施されています。**

      - name: Add label for tracking
        if: always()
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "ai-reviewed" || true
        env:
          GH_TOKEN: ${{ github.token }}

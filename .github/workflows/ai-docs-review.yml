name: AI Docs Review (GitHub Models)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  ai-docs-review:
    runs-on: ubuntu-latest
    # draft PRは対象外（コストコントロール）
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --patch > pr.diff
          # 差分サイズを取得（大規模PR対策の参考用）
          echo "size=$(stat -c%s pr.diff)" >> $GITHUB_OUTPUT
          # 内容をoutputにセット（サイズが大きい場合は後段で制御）
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat pr.diff >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare AI input
        id: prepare-input
        run: |
          python3 - << 'PYEOF'
import os

title = """${{ github.event.pull_request.title }}"""
body = """${{ github.event.pull_request.body || '（本文なし）' }}"""
diff = """${{ steps.diff.outputs.content }}"""

with open('/tmp/ai-review-input.yml', 'w', encoding='utf-8') as f:
    f.write(f'''pr_title: |
  {title}
pr_body: |
  {body}
diff: |
  {diff}
''')

print("input-file=/tmp/ai-review-input.yml")
PYEOF

      - name: AI Documentation Review
        id: review
        uses: actions/ai-inference@v1
        with:
          prompt-file: .github/prompts/docs-review.prompt.yml
          file_input: ${{ steps.prepare-input.outputs.input-file }}

      - name: Post review summary
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🤖 AIドキュメントレビュー結果（GitHub Models）

            ${{ steps.review.outputs.response }}

            ---
            *使用モデル: openai/gpt-4o / 自動生成レビューです。人間による最終確認を強く推奨します。*

            > **このレビューは [docs/用語集.md](https://github.com/${{ github.repository }}/blob/main/docs/用語集.md) および [.github/copilot-instructions.md](https://github.com/${{ github.repository }}/blob/main/.github/copilot-instructions.md) を基に実施されています。**

      - name: Add label for tracking
        if: always()
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "ai-reviewed" || true
        env:
          GH_TOKEN: ${{ github.token }}